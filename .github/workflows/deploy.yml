name: Build & Deploy Frontend (web2025)
run-name: ${{ github.actor }} is deploying to production server 🚀

on:
    push:
        branches: [main]

jobs:
    build-and-publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            - name: Log in to GHCR
              run: echo "${{ secrets.PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            - name: Build and Push Docker Image
              env:
                  GHCR_REPO_OWNER: ${{ github.repository_owner }}
              run: |
                  echo "${{ secrets.ENV_PROD_FRONTEND }}" > .env.frontend
                  source .env.frontend
                  IMAGE_NAME=ghcr.io/hackmesa/web2025:latest
                  docker build \
                    --build-arg NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL \
                    --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY \
                    --build-arg NEXT_PUBLIC_USER_SERVICE_URL=$NEXT_PUBLIC_USER_SERVICE_URL \
                    --build-arg NEXT_PUBLIC_APPLICATION_SERVICE_URL=$NEXT_PUBLIC_APPLICATION_SERVICE_URL \
                    --build-arg NEXT_PUBLIC_GRACE_SERVICE_URL=$NEXT_PUBLIC_GRACE_SERVICE_URL \
                    -t $IMAGE_NAME .
                  docker push $IMAGE_NAME

    deploy:
        needs: build-and-publish
        runs-on: ubuntu-latest

        steps:
            - name: Decode SSH Key
              run: |
                  echo "${{ secrets.EC2_KEY_B64 }}" | base64 -d > ec2_key
                  chmod 600 ec2_key

            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1.0.0
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key_path: ec2_key
                  script: |
                      echo "📝 Writing .env.frontend"
                      mkdir -p /home/ubuntu/app
                      cat > /home/ubuntu/app/.env.frontend <<EOF
                      ${{ secrets.ENV_PROD_FRONTEND }}
                      EOF

                      cd /home/ubuntu/app

                      echo "🧼 Cleaning old container and image (if any)..."
                      CID=$(docker ps -aq --filter "name=web2025")
                      [ -n "$CID" ] && docker rm -f $CID || true

                      IID=$(docker images -q ghcr.io/hackmesa/web2025:latest)
                      [ -n "$IID" ] && docker rmi -f $IID || true

                      echo "🔐 Logging into GHCR"
                      echo "${{ secrets.PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

                      echo "📦 Pulling latest image"
                      docker-compose pull web2025

                      echo "🚀 Restarting container"
                      docker-compose up -d web2025
