name: 🚀 WEB 2025 - HACKMESA

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Decode SSH key
              run: |
                  echo "${{ secrets.EC2_KEY_B64 }}" | base64 -d > ec2_key
                  chmod 600 ec2_key

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.0
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ubuntu
                  key_path: ec2_key
                  script: |
                      set -e

                      echo "🚀 Starting deployment for web2025 (frontend)"

                      BASE_DIR="/home/ubuntu/app"
                      SERVICE_DIR="$BASE_DIR/web2025"
                      IMAGE_NAME="app_web2025"

                      mkdir -p "$BASE_DIR"
                      cd "$BASE_DIR"

                      # Clone or pull the repo
                      if [ ! -d "$SERVICE_DIR/.git" ]; then
                        git clone https://github.com/HACKMESA/web2025.git
                      else
                        cd "$SERVICE_DIR"
                        git pull origin main
                      fi

                      # Write .env.production safely
                      cat > "$SERVICE_DIR/.env.production" <<EOF
                      ${{ secrets.ENV_PROD_FRONTEND }}
                      EOF

                      echo "🧼 Cleaning up old containers/images to free up space..."
                      docker rm -f $(docker ps -aq --filter "name=web2025") || true
                      docker rmi -f $(docker images -q "$IMAGE_NAME") || true

                      echo "🐳 Rebuilding and restarting container..."
                      cd "$BASE_DIR"
                      docker-compose build web2025
                      docker-compose up -d web2025

                      echo "✅ Deploy complete."

                      echo "🧹 System-wide Docker cleanup (volumes + cache)..."
                      docker system prune -af --volumes
